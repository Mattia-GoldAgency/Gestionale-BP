<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Concept 2 (v2) - Busani & Partners</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        busani: {
                            blue: '#2C4457',
                            gray: '#D9DBDC',
                            light: '#F5F6F6'
                        }
                    },
                    fontFamily: {
                        sans: ['Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
                        heading: ['Raleway', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="flex h-screen font-sans antialiased bg-busani-light">
    <!-- Left Column - Image/Brand -->
    <div class="hidden lg:flex lg:w-1/2 bg-busani-blue flex-col justify-between p-12 relative overflow-hidden">
        <div class="relative z-10 w-64">
            <!-- Actual White Logo -->
            <img src="file:///C:/Users/pc42/BRM/Operations%20Mattia%20-%20Documenti/STUDIO%20BUSANI%26PARTNERS/LOGHI%20E%20FIRME%20MAIL/2024/Logo/1_Principale/Busani%20%26%20Partner_Bianco/RGB/Logo_Busani%20%26%20Partner_Positivo.png" alt="Busani & Partners Logo" class="w-full h-auto">
        </div>
        <div class="relative z-10">
            <h2 class="font-heading text-4xl text-white font-light leading-tight">L'eccellenza notarile<br>nell'era digitale.</h2>
            <p class="text-busani-gray mt-4 max-w-md">Piattaforma riservata per la gestione delle pratiche di mutuo e atti notarili dello studio Busani & Partners.</p>
        </div>
        <!-- Decorative geometric shape based on brand square -->
        <div class="absolute -bottom-32 -right-32 w-96 h-96 bg-white opacity-5 transform rotate-45"></div>
    </div>

    <!-- Right Column - Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8">
        <div class="w-full max-w-md">
            <!-- Mobile logo -->
            <div class="lg:hidden w-48 mb-8">
                <img src="file:///C:/Users/pc42/BRM/Operations%20Mattia%20-%20Documenti/STUDIO%20BUSANI%26PARTNERS/LOGHI%20E%20FIRME%20MAIL/2024/Logo/1_Principale/Busani%20%26%20Partner_Positivo/RGB/Logo_Busani%20%26%20Partner_Positivo.png" alt="Busani & Partners Logo" class="w-full h-auto">
            </div>

            <h1 class="font-heading font-semibold text-3xl text-busani-blue mb-2">Benvenuto</h1>
            <p class="text-gray-500 mb-8">Accedi al tuo account per continuare</p>
            
            <form>
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-2" for="email">Indirizzo Email</label>
                    <input type="email" id="email" class="w-full px-0 py-2 bg-transparent border-0 border-b-2 border-busani-gray focus:ring-0 focus:border-busani-blue transition-colors text-busani-blue placeholder-gray-400" placeholder="Inserisci la tua email">
                </div>
                <div class="mb-8">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-medium text-gray-700" for="password">Password</label>
                    </div>
                    <input type="password" id="password" class="w-full px-0 py-2 bg-transparent border-0 border-b-2 border-busani-gray focus:ring-0 focus:border-busani-blue transition-colors text-busani-blue placeholder-gray-400" placeholder="••••••••">
                </div>
                <button type="button" class="w-full bg-busani-blue text-white font-heading font-semibold py-4 px-4 rounded shadow-lg hover:shadow-xl hover:bg-[#1f303e] transition-all duration-300 tracking-wide">
                    ACCEDI ALLA PIATTAFORMA
                </button>
            </form>
        </div>
    </div>
</body>
</html>
